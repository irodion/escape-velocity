name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        # Compile from source via cargo for supply-chain consistency with
        # the rest of the Rust pipeline. The binary lives at ~/.cargo/bin
        # and isn't covered by rust-cache's default cache; reinstalls on
        # every CI run (~30s with a warm registry).
        run: cargo install --locked wasm-pack@0.15.0

      - name: Build WASM artifact
        run: wasm-pack build crates/fractal-wasm --target web --out-dir ../../web/wasm --release

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Biome (format + lint)
        working-directory: web
        run: pnpm lint

      - name: TypeScript check
        working-directory: web
        run: pnpm typecheck

      - name: Build
        working-directory: web
        run: pnpm build

  vet:
    name: Dependency check (safedep/vet)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run vet
        uses: safedep/vet-action@e2a78850eb517b8305b1085bca947bef29213a22 # v1
        with:
          policy: .github/vet/policy.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
