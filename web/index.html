<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape Velocity</title>
    <style>
      /* The canvas's CSS display size stays at 800×600 across all
         resolution selections. Resolution becomes a quality knob
         (super/sub-sampling), not a layout knob — the page never
         reflows when the user changes it. */
      canvas#fractal {
        cursor: crosshair;
        width: 800px;
        height: 600px;
      }
      canvas#fractal.dragging { cursor: all-scroll; }
      form#controls { margin-bottom: 0.5rem; }
      form#controls label { margin-right: 1rem; }
      /* Visualise the Mandelbrot-mode state of the `c` inputs: dim the
         input itself, and use `:has()` to dim the surrounding <label>
         so the visitor reads the whole c.re / c.im strip as "off"
         rather than just the field. */
      input[type="number"]:disabled { opacity: 0.5; }
      form#controls label:has(input:disabled) { opacity: 0.6; }
    </style>
  </head>
  <body>
    <form id="controls">
      <label>
        Iterations:
        <select name="max-iter">
          <option value="64">64</option>
          <option value="128">128</option>
          <option value="256" selected>256</option>
          <option value="512">512</option>
          <option value="1024">1024</option>
          <option value="2048">2048</option>
          <option value="4096">4096</option>
          <option value="8192">8192</option>
        </select>
      </label>
      <label>
        Resolution:
        <select name="resolution">
          <option value="400x300">400 × 300</option>
          <option value="800x600" selected>800 × 600</option>
          <option value="1200x900">1200 × 900</option>
          <option value="1600x1200">1600 × 1200</option>
        </select>
      </label>
      <label>
        Palette:
        <select name="palette">
          <option value="grayscale">Grayscale</option>
          <option value="viridis" selected>Viridis</option>
          <option value="magma">Magma</option>
          <option value="inferno">Inferno</option>
          <option value="twilight">Twilight</option>
        </select>
      </label>
      <label>
        Coloring:
        <select name="normalisation">
          <option value="cycled" selected>Cycled</option>
          <option value="histogram">Match palette to image</option>
        </select>
      </label>
      <label>
        Fractal:
        <select name="mode">
          <option value="mandelbrot" selected>Mandelbrot</option>
          <option value="julia">Julia</option>
        </select>
      </label>
      <label>
        c.re:
        <input type="number" name="c-re" step="0.0001" value="-0.7" disabled />
      </label>
      <label>
        c.im:
        <input type="number" name="c-im" step="0.0001" value="0.27015" disabled />
      </label>
    </form>
    <canvas id="fractal" width="800" height="600"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
